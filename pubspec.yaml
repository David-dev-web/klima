name: klima
description: "Klima - Eine wunderschöne Material You Wetter-App."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.6.0
  geolocator: ^14.0.2
  dynamic_color: ^1.8.1
  google_fonts: ^8.0.2
  shimmer: ^3.0.0
  home_widget: ^0.9.0
  intl: ^0.20.2
  shared_preferences: ^2.5.4
  webview_flutter: ^4.13.1
  provider: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
  adaptive_icon_background: "#FF8C00"
  adaptive_icon_foreground: "assets/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/

